name: GasQ CI

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gasq/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -m compileall app