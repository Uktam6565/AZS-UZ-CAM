
services:
  postgres:
    image: postgres:15
    container_name: gasq-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: gasq
      POSTGRES_USER: gasq
      POSTGRES_PASSWORD: gasq
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasq"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./gasq/backend
      dockerfile: Dockerfile
    container_name: gasq-backend-prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./gasq/backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: gasq-nginx-prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./gasq/frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data: