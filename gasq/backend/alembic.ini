[alembic]
script_location = alembic
prepend_sys_path = .

# ВАЖНО: реальную строку подключения мы будем брать из app/core/config.py через env.py,
# поэтому здесь можно оставить заглушку.
sqlalchemy.url = postgresql+asyncpg://gasq:gasq@localhost:5432/gasq

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
