<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GasQ Driver</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    header { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .box { border:1px solid #ddd; border-radius:12px; padding:12px; margin-top:12px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .col { flex:1; min-width:280px; }
    input, select, button { padding:10px 12px; border-radius:10px; border:1px solid #ccc; }
    button { background:#fff; cursor:pointer; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #eee; padding:8px; text-align:left; }
    .big { font-size: 20px; font-weight: 800; }
    .muted { color:#666; }
    .ticket { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    .pill { display:inline-block; padding:4px 10px; border:1px solid #ddd; border-radius:999px; font-size:12px; }
    .stationCard { padding:10px; border:1px solid #eee; border-radius:12px; margin-bottom:8px; }
    .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  </style>
</head>
<body>
  <header>
    <div class="big" id="title">GasQ — Водитель</div>

    <label class="muted">
      API:
      <input id="apiBase" type="text" value="http://localhost:8000" style="width:260px;">
    </label>

    <label class="muted">
      Язык:
      <select id="lang">
        <option value="ru">RU</option>
        <option value="uz">UZ</option>
        <option value="en">EN</option>
      </select>
    </label>

    <button id="locBtn">📍 GPS</button>
  </header>

  <div class="box">
    <div class="big" id="nearTitle">Ближайшие АЗС</div>

    <div class="row" style="margin-top:10px;">
      <div class="col">
        <label class="muted" id="radiusLabel">Радиус (км):</label><br/>
        <input id="radiusKm" type="number" value="10" min="1" max="200" style="width:120px;">
      </div>
      <div class="col">
        <label class="muted" id="fuelLabel">Топливо:</label><br/>
        <select id="fuelType">
          <option value="">all</option>
          <option value="gasoline">gasoline</option>
          <option value="diesel">diesel</option>
          <option value="lpg">lpg</option>
          <option value="ev">ev</option>
        </select>
      </div>
      <div class="col">
        <label class="muted" id="servicesLabel">Услуги:</label><br/>
        <select id="serviceFilter">
          <option value="">—</option>
          <option value="cafe">cafe</option>
          <option value="shop">shop</option>
          <option value="service">service</option>
          <option value="toilet">toilet</option>
          <option value="wifi">wifi</option>
        </select>
      </div>
      <div class="col">
        <button id="loadStationsBtn">Показать</button>
      </div>
    </div>

    <div class="box" style="margin-top:10px;">
      <div class="muted" id="gpsStatus">GPS: неизвестно</div>
      <div id="stationsList" style="margin-top:10px;"></div>
    </div>
  </div>

  <div class="box">
    <div class="big" id="queueTitle">Очередь</div>

    <div class="row" style="margin-top:10px;">
      <div class="col">
        <div class="muted" id="selectedStationLabel">Выбранная АЗС:</div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <span class="pill" id="selectedStation">—</span>
          <input id="stationIdManual" type="number" min="1" placeholder="Station ID" style="width:120px;">
          <button id="setStationBtn">Применить</button>
        </div>
      </div>
      <div class="col">
        <div class="muted" id="phoneLabel">Телефон (для SMS, опционально):</div>
        <input id="driverPhone" type="text" placeholder="+998901234567" style="width:220px;">
      </div>
    </div>

    <div class="btnRow">
      <button id="joinBtn">Встать в очередь</button>
      <button id="refreshQueueBtn">Обновить статус</button>
    </div>

    <div class="box" style="margin-top:10px;">
      <div class="muted" id="myTicketLabel">Мой талон:</div>
      <div id="myTicket" class="ticket">—</div>
      <div class="muted" id="myTicketStatus">—</div>
    </div>

    <div class="box" style="margin-top:10px;">
      <div class="muted" id="queuePanelLabel">Панель очереди:</div>
      <table>
        <thead>
          <tr>
            <th id="thCalled">Called</th>
            <th id="thWaiting">Waiting</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td id="calledCol" style="vertical-align:top;"></td>
            <td id="waitingCol" style="vertical-align:top;"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="box" style="margin-top:10px;">
      <div class="big" id="rateTitle">Оценить АЗС</div>

      <div class="row" style="margin-top:10px;">
        <div class="col">
          <label class="muted" id="starsLabel">Оценка (1..5):</label><br/>
          <select id="stars">
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>
        <div class="col">
          <label class="muted" id="commentLabel">Комментарий:</label><br/>
          <input id="comment" placeholder="..." style="width:100%;">
        </div>
        <div class="col">
          <button id="sendRatingBtn">Отправить</button>
        </div>
      </div>

      <div class="muted" id="ratingResult">—</div>
    </div>

  </div>

<script>
  const i18n = {
    ru: {
      title: "GasQ — Водитель",
      nearTitle: "Ближайшие АЗС",
      radiusLabel: "Радиус (км):",
      fuelLabel: "Топливо:",
      servicesLabel: "Услуги:",
      show: "Показать",
      gpsUnknown: "GPS: неизвестно",
      gpsOk: "GPS: получено",
      gpsFail: "GPS: ошибка (разреши доступ к геолокации)",
      selectStation: "Выбранная АЗС:",
      applyStation: "Применить",
      phone: "Телефон (для SMS, опционально):",
      join: "Встать в очередь",
      refresh: "Обновить статус",
      myTicket: "Мой талон:",
      panel: "Панель очереди:",
      called: "Вызваны",
      waiting: "Ожидают",
      joined: "Вы в очереди",
      needStation: "Сначала выбери АЗС",
      error: "Ошибка",
      rateTitle: "Оценить АЗС",
      starsLabel: "Оценка (1..5):",
      commentLabel: "Комментарий:",
      send: "Отправить",
      ratedOk: "Спасибо! Оценка отправлена."
    },
    uz: {
      title: "GasQ — Haydovchi",
      nearTitle: "Yaqin AZS",
      radiusLabel: "Radius (km):",
      fuelLabel: "Yoqilg‘i:",
      servicesLabel: "Xizmatlar:",
      show: "Ko‘rsatish",
      gpsUnknown: "GPS: noma'lum",
      gpsOk: "GPS: olindi",
      gpsFail: "GPS: xatolik (geolokatsiyaga ruxsat bering)",
      selectStation: "Tanlangan AZS:",
      applyStation: "Qo‘llash",
      phone: "Telefon (SMS uchun, ixtiyoriy):",
      join: "Navbatga turish",
      refresh: "Holatni yangilash",
      myTicket: "Mening talonim:",
      panel: "Navbat paneli:",
      called: "Chaqarilgan",
      waiting: "Kutilmoqda",
      joined: "Siz navbatdasiz",
      needStation: "Avval AZS tanlang",
      error: "Xatolik",
      rateTitle: "AZS ni baholash",
      starsLabel: "Baho (1..5):",
      commentLabel: "Izoh:",
      send: "Yuborish",
      ratedOk: "Rahmat! Baholash yuborildi."
    },
    en: {
      title: "GasQ — Driver",
      nearTitle: "Nearby stations",
      radiusLabel: "Radius (km):",
      fuelLabel: "Fuel:",
      servicesLabel: "Services:",
      show: "Show",
      gpsUnknown: "GPS: unknown",
      gpsOk: "GPS: acquired",
      gpsFail: "GPS: error (allow location access)",
      selectStation: "Selected station:",
      applyStation: "Apply",
      phone: "Phone (for SMS, optional):",
      join: "Join queue",
      refresh: "Refresh status",
      myTicket: "My ticket:",
      panel: "Queue panel:",
      called: "Called",
      waiting: "Waiting",
      joined: "You joined the queue",
      needStation: "Select a station first",
      error: "Error",
      rateTitle: "Rate station",
      starsLabel: "Stars (1..5):",
      commentLabel: "Comment:",
      send: "Send",
      ratedOk: "Thanks! Rating sent."
    }
  };

  function t(key){
    const lang = document.getElementById('lang').value;
    return (i18n[lang] && i18n[lang][key]) || i18n.ru[key] || key;
  }

  function applyLang(){
    document.getElementById('title').textContent = t('title');
    document.getElementById('nearTitle').textContent = t('nearTitle');
    document.getElementById('radiusLabel').textContent = t('radiusLabel');
    document.getElementById('fuelLabel').textContent = t('fuelLabel');
    document.getElementById('servicesLabel').textContent = t('servicesLabel');
    document.getElementById('loadStationsBtn').textContent = t('show');

    document.getElementById('selectedStationLabel').textContent = t('selectStation');
    document.getElementById('setStationBtn').textContent = t('applyStation');

    document.getElementById('phoneLabel').textContent = t('phone');
    document.getElementById('joinBtn').textContent = t('join');
    document.getElementById('refreshQueueBtn').textContent = t('refresh');
    document.getElementById('myTicketLabel').textContent = t('myTicket');
    document.getElementById('queuePanelLabel').textContent = t('panel');
    document.getElementById('thCalled').textContent = t('called');
    document.getElementById('thWaiting').textContent = t('waiting');

    document.getElementById('rateTitle').textContent = t('rateTitle');
    document.getElementById('starsLabel').textContent = t('starsLabel');
    document.getElementById('commentLabel').textContent = t('commentLabel');
    document.getElementById('sendRatingBtn').textContent = t('send');

    if(!window._gps) document.getElementById('gpsStatus').textContent = t('gpsUnknown');
  }

  async function api(path, opts){
    const base = document.getElementById('apiBase').value.replace(/\/+$/, '');
    const r = await fetch(base + path, opts);
    if(!r.ok){
      const txt = await r.text();
      throw new Error(txt || ("HTTP " + r.status));
    }
    return r.json();
  }

  function qs(){
    return new URLSearchParams(location.search);
  }

  function setSelectedStation(id){
    window._stationId = id ? Number(id) : null;
    document.getElementById('selectedStation').textContent = window._stationId ? ("#" + window._stationId) : "—";
  }

  function setFuelFromQuery(){
    const q = qs();
    const st = q.get("station_id");
    const ft = q.get("fuel_type");
    if(st) setSelectedStation(st);
    if(ft) document.getElementById('fuelType').value = ft;
  }

  function getServiceFilter(){
    const s = document.getElementById('serviceFilter').value;
    return s || null;
  }

  async function getGPS(){
    return new Promise((resolve, reject) => {
      if(!navigator.geolocation) return reject(new Error("No geolocation"));
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        err => reject(err),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  }

  function stationCard(st){
    const div = document.createElement('div');
    div.className = "stationCard";

    const dist = (st.distance_km !== undefined) ? `${st.distance_km} km` : "";
    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
        <div>
          <div class="big">${st.name || ("Station #" + st.id)}</div>
          <div class="muted">${st.address || ""}</div>
          <div style="margin-top:6px;">
            <span class="pill">${st.fuel_types || ""}</span>
            ${dist ? `<span class="pill">${dist}</span>` : ""}
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
          <button data-st="${st.id}">${t('applyStation')}</button>
        </div>
      </div>
    `;
    div.querySelector('button').addEventListener('click', async () => {
      setSelectedStation(st.id);
      document.getElementById('stationIdManual').value = String(st.id);
      await loadQueuePanel().catch(()=>{});
    });
    return div;
  }

  async function loadStations(){
    const list = document.getElementById('stationsList');
    list.innerHTML = `<div class="muted">...</div>`;

    const fuel = document.getElementById('fuelType').value;
    const radius = Number(document.getElementById('radiusKm').value || 10);
    const service = getServiceFilter();

    let items = [];
    if(window._gps){
      const p = new URLSearchParams({ lat: window._gps.lat, lon: window._gps.lon, radius_km: String(radius) });
      if(fuel) p.set("fuel", fuel);
      items = await api(`/api/stations/nearby?${p.toString()}`);

      if(service){
        const detailed = [];
        for(const s of items){
          const d = await api(`/api/stations/${s.id}`);
          detailed.push({ ...s, ...d });
        }
        items = detailed.filter(x => x.services && x.services[service] === true);
      }
    }else{
      const p = new URLSearchParams();
      if(fuel) p.set("fuel", fuel);
      if(service) p.set(`has_${service}`, "true");
      items = await api(`/api/stations?${p.toString()}`);
    }

    list.innerHTML = "";
    if(!items.length){
      list.innerHTML = `<div class="muted">—</div>`;
      return;
    }
    for(const st of items){
      list.appendChild(stationCard(st));
    }
  }

  function renderTicketList(items){
    if(!items.length) return `<div class="muted">—</div>`;
    return items.map(x => `<div><b>${x.ticket_no}</b> <span class="muted">${x.status}</span></div>`).join("");
  }

  async function loadQueuePanel(){
    if(!window._stationId) return;
    const fuel = document.getElementById('fuelType').value;
    const p = new URLSearchParams({ station_id: String(window._stationId) });
    if(fuel) p.set("fuel_type", fuel);
    const panel = await api(`/api/queue/panel?${p.toString()}`);

    document.getElementById('calledCol').innerHTML = renderTicketList(panel.called || []);
    document.getElementById('waitingCol').innerHTML = renderTicketList(panel.waiting || []);
  }

  function saveMyTicket(ticket){
    localStorage.setItem("gasq_my_ticket", JSON.stringify(ticket));
  }

  function loadMyTicket(){
    try {
      const raw = localStorage.getItem("gasq_my_ticket");
      if(!raw) return null;
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  function showMyTicket(tk){
    if(!tk){
      document.getElementById('myTicket').textContent = "—";
      document.getElementById('myTicketStatus').textContent = "—";
      return;
    }
    document.getElementById('myTicket').textContent = tk.ticket_no || "—";
    document.getElementById('myTicketStatus').textContent = tk.status ? (t('joined') + " • " + tk.status) : "—";
  }

  async function joinQueue(){
    if(!window._stationId){
      alert(t('needStation'));
      return;
    }
    const fuel = document.getElementById('fuelType').value || "gasoline";
    const phone = document.getElementById('driverPhone').value.trim() || null;

    const payload = {
      station_id: window._stationId,
      fuel_type: fuel,
      driver_phone: phone,
      source: "app"
    };

    const res = await api(`/api/queue/join`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const tk = { ...res, station_id: window._stationId, fuel_type: fuel };
    saveMyTicket(tk);
    showMyTicket(tk);
    await loadQueuePanel();
  }

  async function refreshMyTicket(){
    const tk = loadMyTicket();
    showMyTicket(tk);
    if(!tk || !tk.station_id) return;
    await loadQueuePanel();
  }

  async function sendRating(){
    if(!window._stationId){
      alert(t('needStation'));
      return;
    }
    const stars = Number(document.getElementById('stars').value);
    const comment = document.getElementById('comment').value.trim() || null;

    await api(`/api/ratings`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        station_id: window._stationId,
        stars: stars,
        comment: comment
      })
    });

    document.getElementById('ratingResult').textContent = t('ratedOk');
    document.getElementById('comment').value = "";
  }

  // ---- init ----
  document.getElementById('lang').addEventListener('change', () => {
    applyLang();
    loadQueuePanel().catch(()=>{});
  });

  document.getElementById('locBtn').addEventListener('click', async () => {
    try{
      document.getElementById('gpsStatus').textContent = t('gpsUnknown');
      window._gps = await getGPS();
      document.getElementById('gpsStatus').textContent =
        `${t('gpsOk')}: ${window._gps.lat.toFixed(5)}, ${window._gps.lon.toFixed(5)}`;
    }catch(e){
      document.getElementById('gpsStatus').textContent = t('gpsFail');
    }
  });

  document.getElementById('loadStationsBtn').addEventListener('click', () => {
    loadStations().catch(e => alert(t('error') + ": " + e.message));
  });

  document.getElementById('setStationBtn').addEventListener('click', async () => {
    const v = Number(document.getElementById('stationIdManual').value);
    if(!v) { alert(t('needStation')); return; }
    setSelectedStation(v);
    await loadQueuePanel().catch(()=>{});
  });

  document.getElementById('joinBtn').addEventListener('click', () => {
    joinQueue().catch(e => alert(t('error') + ": " + e.message));
  });

  document.getElementById('refreshQueueBtn').addEventListener('click', () => {
    refreshMyTicket().catch(()=>{});
  });

  document.getElementById('sendRatingBtn').addEventListener('click', () => {
    sendRating().catch(e => alert(t('error') + ": " + e.message));
  });

  // применим параметры из URL
  setFuelFromQuery();

  // язык
  applyLang();

  // если station_id был в URL — проставим и в ручной ввод
  if(window._stationId){
    document.getElementById('stationIdManual').value = String(window._stationId);
  }

  // загрузим мой талон, если есть
  showMyTicket(loadMyTicket());

  // автообновление панели очереди
  setInterval(() => loadQueuePanel().catch(()=>{}), 4000);

  // если station_id уже задан — подтянем панель
  if(window._stationId) loadQueuePanel().catch(()=>{});
</script>
</body>
</html>
