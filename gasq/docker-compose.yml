version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: gasq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gasq
      POSTGRES_USER: gasq
      POSTGRES_PASSWORD: gasq
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gasq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
