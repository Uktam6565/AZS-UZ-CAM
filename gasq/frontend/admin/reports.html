<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GasQ — Отчёты</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111b2e;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --line:rgba(255,255,255,.10);
      --btn:#1b2a45;
      --btn2:#22365a;
      --ok:#1b7f3a;
      --bad:#b3261e;
    }
    body{
      margin:0; padding:18px;
      background: radial-gradient(1200px 700px at 20% 0%, #16234a 0%, var(--bg) 55%, #070b14 100%);
      color:var(--text);
      font-family: Arial, sans-serif;
      font-size:18px; /* крупнее для глаз */
    }
    .topbar{
      display:flex; flex-wrap:wrap; gap:12px; align-items:center;
      margin-bottom:14px;
    }
    .brand{
      font-size:28px; font-weight:800;
      letter-spacing:.2px;
      margin-right:10px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:10px;
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
    }
    label{ color:var(--muted); font-size:14px; }
    input, select{
      font-size:18px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.25);
      color: var(--text);
      outline:none;
    }
    input::placeholder{ color: rgba(255,255,255,.35); }

    button{
      font-size:18px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color: var(--text);
      cursor:pointer;
    }
    button:hover{ background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05)); }
    .btnPrimary{ background: linear-gradient(180deg, rgba(70,120,255,.45), rgba(70,120,255,.18)); }
    .btnPrimary:hover{ background: linear-gradient(180deg, rgba(70,120,255,.55), rgba(70,120,255,.22)); }
    .btnDanger{ background: linear-gradient(180deg, rgba(255,80,80,.40), rgba(255,80,80,.16)); }
    .btnDanger:hover{ background: linear-gradient(180deg, rgba(255,80,80,.52), rgba(255,80,80,.20)); }

    .wrap{ max-width:1100px; margin:0 auto; }
    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:14px;
      margin-top:14px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 520px){
      .grid{ grid-template-columns: 1fr; }
    }
    .card{
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .kpiLabel{ color:var(--muted); font-size:14px; }
    .kpiValue{ font-size:34px; font-weight:900; margin-top:8px; letter-spacing:.5px; }
    .sub{ color:var(--muted); font-size:14px; margin-top:6px; }

    .sectionTitle{
      margin:20px 0 10px 0;
      font-size:22px; font-weight:800;
    }

    table{
      width:100%;
      border-collapse: collapse;
      overflow:hidden;
      border-radius: 18px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
    }
    th, td{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:18px;
    }
    th{
      color:var(--muted);
      font-weight:700;
      background: rgba(0,0,0,.18);
    }
    .rowBetween{
      display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .status{
      font-size:14px;
      color:var(--muted);
    }
    .status b{ color: var(--text); }
    .toast{
      margin-top:10px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.25);
      color: var(--muted);
      display:none;
    }
    .toast.ok{ border-color: rgba(40,200,110,.45); color: rgba(160,255,200,.92); }
    .toast.bad{ border-color: rgba(255,80,80,.45); color: rgba(255,190,190,.92); }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand" id="title">📊 Отчёты</div>

      <div class="pill">
        <label for="stationId">Station ID</label>
        <input id="stationId" type="number" value="1" min="1" style="width:110px" />
      </div>

      <div class="pill">
        <label for="dateFrom" id="lblFrom">С</label>
        <input id="dateFrom" type="date" />
      </div>

      <div class="pill">
        <label for="dateTo" id="lblTo">По</label>
        <input id="dateTo" type="date" />
      </div>

      <div class="pill">
        <label for="apiBase">API</label>
        <input id="apiBase" type="text" value="http://localhost:8000" style="width:280px" />
      </div>

      <div class="pill">
        <label for="lang" id="lblLang">Язык</label>
        <select id="lang">
          <option value="ru">RU</option>
          <option value="uz">UZ</option>
          <option value="en">EN</option>
        </select>
      </div>

      <button class="btnPrimary" id="btnRefresh">Обновить</button>
      <button id="btnCsv">Скачать CSV</button>
      <button class="btnDanger" id="btnLogout">Выйти</button>
    </div>

    <div class="status" id="whoami">Роль: <b>—</b></div>
    <div class="toast" id="toast"></div>

    <div class="grid">
      <div class="card">
        <div class="kpiLabel" id="kTotalLabel">Всего талонов</div>
        <div class="kpiValue" id="totalTickets">—</div>
      </div>

      <div class="card">
        <div class="kpiLabel" id="kCalledLabel">Вызвано</div>
        <div class="kpiValue" id="called">—</div>
      </div>

      <div class="card">
        <div class="kpiLabel" id="kWaitingLabel">Ожидают</div>
        <div class="kpiValue" id="waiting">—</div>
      </div>

      <div class="card">
        <div class="kpiLabel" id="kAvgLabel">Среднее ожидание</div>
        <div class="kpiValue" id="avgWait">—</div>
        <div class="sub" id="avgHint">(часы : минуты)</div>
      </div>
    </div>

    <div class="rowBetween" style="margin-top:16px;">
      <div class="sectionTitle" id="fuelTitle">⛽ По типам топлива</div>
      <div class="status" id="generatedAt">Сформировано: <b>—</b></div>
    </div>

    <table>
      <thead>
        <tr>
          <th id="thFuel">Топливо</th>
          <th id="thCount">Количество талонов</th>
        </tr>
      </thead>
      <tbody id="fuelTable"></tbody>
    </table>
  </div>

  <!-- общий auth helper -->
  <script src="/auth.js"></script>

  <script>
    // --- i18n ---
    const I18N = {
      ru: {
        title: "📊 Отчёты",
        from: "С",
        to: "По",
        lang: "Язык",
        refresh: "Обновить",
        csv: "Скачать CSV",
        logout: "Выйти",
        total: "Всего талонов",
        called: "Вызвано",
        waiting: "Ожидают",
        avg: "Среднее ожидание",
        avgHint: "(часы : минуты)",
        fuelTitle: "⛽ По типам топлива",
        fuel: "Топливо",
        count: "Количество талонов",
        noData: "Нет данных",
        authRequired: "Нужно войти в систему",
        downloadReady: "CSV готов — скачивание началось",
      },
      uz: {
        title: "📊 Hisobotlar",
        from: "Dan",
        to: "Gacha",
        lang: "Til",
        refresh: "Yangilash",
        csv: "CSV yuklab olish",
        logout: "Chiqish",
        total: "Jami talonlar",
        called: "Chaqarilgan",
        waiting: "Kutilmoqda",
        avg: "O‘rtacha kutish",
        avgHint: "(soat : daqiqa)",
        fuelTitle: "⛽ Yoqilg‘i bo‘yicha",
        fuel: "Yoqilg‘i",
        count: "Talonlar soni",
        noData: "Ma’lumot yo‘q",
        authRequired: "Avval tizimga kiring",
        downloadReady: "CSV tayyor — yuklab olinmoqda",
      },
      en: {
        title: "📊 Reports",
        from: "From",
        to: "To",
        lang: "Language",
        refresh: "Refresh",
        csv: "Download CSV",
        logout: "Logout",
        total: "Total tickets",
        called: "Called",
        waiting: "Waiting",
        avg: "Avg wait",
        avgHint: "(hours : minutes)",
        fuelTitle: "⛽ By fuel type",
        fuel: "Fuel",
        count: "Tickets count",
        noData: "No data",
        authRequired: "Please login first",
        downloadReady: "CSV ready — download started",
      }
    };

    function L(key){
      const lang = document.getElementById("lang").value || "ru";
      return (I18N[lang] && I18N[lang][key]) || I18N.ru[key] || key;
    }

    function applyLang(){
      document.getElementById("title").textContent = L("title");
      document.getElementById("lblFrom").textContent = L("from");
      document.getElementById("lblTo").textContent = L("to");
      document.getElementById("lblLang").textContent = L("lang");
      document.getElementById("btnRefresh").textContent = L("refresh");
      document.getElementById("btnCsv").textContent = L("csv");
      document.getElementById("btnLogout").textContent = L("logout");
      document.getElementById("kTotalLabel").textContent = L("total");
      document.getElementById("kCalledLabel").textContent = L("called");
      document.getElementById("kWaitingLabel").textContent = L("waiting");
      document.getElementById("kAvgLabel").textContent = L("avg");
      document.getElementById("avgHint").textContent = L("avgHint");
      document.getElementById("fuelTitle").textContent = L("fuelTitle");
      document.getElementById("thFuel").textContent = L("fuel");
      document.getElementById("thCount").textContent = L("count");
    }

    // --- helpers ---
    function toast(msg, type="ok"){
      const t = document.getElementById("toast");
      t.className = "toast " + (type === "bad" ? "bad" : "ok");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(()=>{ t.style.display="none"; }, 2200);
    }

    function secondsToHM(sec){
      if(sec === null || sec === undefined) return "—";
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return `${h}:${m.toString().padStart(2,"0")}`;
    }

    function apiBase(){
      return (document.getElementById("apiBase").value || "http://localhost:8000").replace(/\/+$/, "");
    }

    function getToken(){
      // если есть AUTH.js — используем его
      if(window.AUTH && typeof window.AUTH.token !== "undefined") return window.AUTH.token;
      // fallback
      return localStorage.getItem("gasq_token");
    }

    function logout(){
      if(window.AUTH && typeof window.AUTH.logout === "function") return window.AUTH.logout();
      localStorage.removeItem("gasq_token");
      location.href = "/admin/login.html";
    }

    async function apiFetch(path, opts={}){
      const token = getToken();
      if(!token){
        toast(L("authRequired"), "bad");
        setTimeout(()=>location.href="/admin/login.html", 700);
        throw new Error("No token");
      }

      const headers = Object.assign({}, opts.headers || {});
      headers["Authorization"] = "Bearer " + token;
      // JSON по умолчанию
      if(opts.json){
        headers["Content-Type"] = "application/json";
      }

      const res = await fetch(apiBase() + path, Object.assign({}, opts, { headers }));
      if(!res.ok){
        const txt = await res.text().catch(()=> "");
        throw new Error(txt || ("HTTP " + res.status));
      }
      return res;
    }

    async function loadWhoAmI(){
      // роль можно достать из токена (jwt payload), но проще — просто показать "token есть"
      // Если у тебя в auth.js уже есть decode — оно может показывать роль.
      let role = "—";
      try{
        if(window.AUTH && typeof window.AUTH.role === "function"){
          role = window.AUTH.role() || "—";
        } else {
          // примитивный decode JWT payload
          const token = getToken();
          const payload = token.split(".")[1];
          const json = JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
          role = json.role || "—";
        }
      } catch(e){}
      document.querySelector("#whoami b").textContent = role;
    }

    async function loadReport(){
      applyLang();
      await loadWhoAmI();

      const stationId = document.getElementById("stationId").value;
      const dateFrom = document.getElementById("dateFrom").value;
      const dateTo = document.getElementById("dateTo").value;

      if(!stationId){
        toast("Station ID?", "bad");
        return;
      }

      const qs = new URLSearchParams();
      qs.set("station_id", String(stationId));
      if(dateFrom) qs.set("date_from", dateFrom);
      if(dateTo) qs.set("date_to", dateTo);

      try{
        const res = await apiFetch(`/api/reports/summary?${qs.toString()}`);
        const data = await res.json();

        document.getElementById("totalTickets").textContent = data.total_tickets ?? "—";
        document.getElementById("called").textContent = data.called ?? "—";
        document.getElementById("waiting").textContent = data.waiting ?? "—";
        document.getElementById("avgWait").textContent = secondsToHM(data.avg_wait_seconds);

        document.querySelector("#generatedAt b").textContent = (data.generated_at || "—");

        const tbody = document.getElementById("fuelTable");
        tbody.innerHTML = "";
        const fuels = data.by_fuel || {};
        const keys = Object.keys(fuels);

        if(keys.length === 0){
          tbody.innerHTML = `<tr><td colspan="2" style="color:var(--muted)">${L("noData")}</td></tr>`;
        } else {
          keys.sort((a,b)=> String(a).localeCompare(String(b)));
          for(const fuel of keys){
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${fuel}</td><td>${fuels[fuel]}</td>`;
            tbody.appendChild(tr);
          }
        }
      } catch(err){
        console.error(err);
        toast(String(err.message || err), "bad");
      }
    }

    async function downloadCSV(){
      applyLang();
      const stationId = document.getElementById("stationId").value;
      const dateFrom = document.getElementById("dateFrom").value;
      const dateTo = document.getElementById("dateTo").value;

      if(!stationId){
        toast("Station ID?", "bad");
        return;
      }

      const qs = new URLSearchParams();
      qs.set("station_id", String(stationId));
      if(dateFrom) qs.set("date_from", dateFrom);
      if(dateTo) qs.set("date_to", dateTo);

      try{
        const res = await apiFetch(`/api/reports/export/csv?${qs.toString()}`);
        const blob = await res.blob();

        const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
        const filename = `gasq_report_station_${stationId}_${stamp}.csv`;

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        toast(L("downloadReady"), "ok");
      } catch(err){
        console.error(err);
        toast(String(err.message || err), "bad");
      }
    }

    document.getElementById("btnRefresh").addEventListener("click", loadReport);
    document.getElementById("btnCsv").addEventListener("click", downloadCSV);
    document.getElementById("btnLogout").addEventListener("click", logout);
    document.getElementById("lang").addEventListener("change", loadReport);

    // автоподгрузка
    (function init(){
      // по умолчанию поставим dateFrom/dateTo на сегодня (удобно)
      const today = new Date().toISOString().slice(0,10);
      document.getElementById("dateFrom").value = today;
      document.getElementById("dateTo").value = today;

      loadReport();
    })();
  </script>
</body>
</html>
