<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GasQ — Check-in</title>
  <style>
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#0b0f17; color:#fff; }
    .wrap{ max-width:520px; margin:0 auto; padding:22px; }
    .card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }
    h1{ margin:0 0 6px 0; font-size:18px; }
    .muted{ opacity:.75; font-size:13px; }
    input, button{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:16px;
      margin-top:12px;
      box-sizing:border-box;
    }
    button{ cursor:pointer; background:#fff; color:#111; border-color:#fff; font-weight:800; }
    .ok{ margin-top:12px; padding:12px; border-radius:14px; background:rgba(0,255,170,.12); border:1px solid rgba(0,255,170,.25); }
    .err{ margin-top:12px; padding:12px; border-radius:14px; background:rgba(255,0,80,.12); border:1px solid rgba(255,0,80,.25); }
    pre{ margin:0; white-space:pre-wrap; word-break:break-word; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Check-in на АЗС</h1>
      <div class="muted">Введите код (claim_code) или откройте ссылку по QR.</div>

      <input id="code" placeholder="Например: ABC123" />
      <button id="btn">Подтвердить прибытие</button>

      <div id="msg"></div>
    </div>
  </div>

<script>
  const codeEl = document.getElementById("code");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  function setMsg(type, text, data){
    const cls = type === "ok" ? "ok" : "err";
    const body = data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : "";
    msg.innerHTML = `<div class="${cls}">${text}${body}</div>`;
  }

  function getQueryParam(name){
    const u = new URL(window.location.href);
    return u.searchParams.get(name);
  }

  async function submit(){
    const claim_code = String(codeEl.value || "").trim();
    if (!claim_code) return setMsg("err", "Нужно ввести claim_code");

    btn.disabled = true;
    msg.innerHTML = "";

    let res;
    try{
      res = await fetch("/api/checkin/by-claim", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ claim_code })
      });
    } catch(e){
      btn.disabled = false;
      return setMsg("err", "NETWORK ERROR: backend недоступен");
    }

    let data = null;
    try{ data = await res.json(); } catch(e){}

    btn.disabled = false;

    if (!res.ok){
      const err = data?.error || data?.detail || `HTTP ${res.status}`;
      return setMsg("err", "Ошибка: " + (typeof err === "string" ? err : JSON.stringify(err)), data);
    }

    return setMsg("ok", "✅ Прибытие подтверждено!", data);
  }

  btn.addEventListener("click", submit);

  // автозаполнение из QR: /checkin.html?claim_code=...
  const q = getQueryParam("claim_code");
  if (q){
    codeEl.value = q;
    submit();
  }
</script>
</body>
</html>
